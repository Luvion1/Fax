name: Bug Report
description: Create a report to help us improve Fax-lang
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: description
    attributes:
      label: Describe the Bug
      description: A clear and concise description of what the bug is.
      placeholder: "The compiler crashes when I use nested structs..."
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: Steps to reproduce the behavior. Please include code snippets.
      placeholder: |
        1. Create file 'test.fax'
        2. Paste the following code:
           ```fax
           fn main() { ... }
           ```
        3. Run 'faxc test.fax'
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Affected Component
      options:
        - Lexer (Rust)
        - Parser (Zig)
        - Semantic Analysis (Haskell)
        - Codegen (C++)
        - Runtime (Zig/Rust)
        - CLI/Hub (TypeScript)
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Fax version, etc.
      placeholder: "Linux (Ubuntu 22.04), Zig 0.13.0"
