name: Release Build

on:
  push:
    tags:
      - "v*"

jobs:
  build-release:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ./faxc

    steps:
      - uses: actions/checkout@v6

      # --- SETUP (Mirrors CI) ---
      - name: Setup Tools
        run: |
          sudo apt-get update && sudo apt-get install -y wget curl build-essential python3.14
          # (Simplified setup for brevity, ideally share scripts)
          wget -q https://nodejs.org/dist/v25.4.0/node-v25.4.0-linux-x64.tar.xz
          tar -xf node-v25.4.0-linux-x64.tar.xz -C /tmp
          echo "/tmp/node-v25.4.0-linux-x64/bin" >> $GITHUB_PATH
          
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain 1.93.0
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          
          curl --proto '=https' --tlsv1.2 -sSf https://get-ghcup.haskell.org | sh
          . $HOME/.ghcup/env && ghcup install ghc 9.10.1 && ghcup set ghc 9.10.1
          echo "$HOME/.ghcup/bin" >> $GITHUB_PATH

      - name: Build Components
        run: |
          cargo build --release --bin lexer
          ghc -dynamic -O2 src/components/sema/sema.hs -o src/components/sema/sema_bin
          g++ -O3 src/components/codegen/codegen.cpp -o src/components/codegen/codegen_bin

      - name: Package
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          PKG_NAME=fax-lang-${VERSION}-linux-x64
          mkdir $PKG_NAME
          
          # Copy Source & Runtime
          cp -r src package.json tsconfig.json $PKG_NAME/
          
          # Copy Binaries (Pre-compiled)
          mkdir -p $PKG_NAME/bin
          cp target/release/lexer $PKG_NAME/bin/
          cp src/components/sema/sema_bin $PKG_NAME/bin/
          cp src/components/codegen/codegen_bin $PKG_NAME/bin/
          
          # Archive
          tar -czvf ${PKG_NAME}.tar.gz $PKG_NAME

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: faxc/*.tar.gz
