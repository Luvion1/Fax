name: Fax-lang Master CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-test:
    name: Build & Test (Linux)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      # --- TOOLCHAIN SETUP ---

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: master

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Setup GHC (Haskell)
        uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.10.1'
          cabal-version: 'latest'

      - name: Install System Deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgmp-dev libncurses-dev python3

      # --- BUILD & VERIFY ---

      - name: Verify Versions
        run: |
          node -v
          zig version
          cargo --version
          ghc --version

      - name: Install NPM Deps
        run: npm ci

      - name: Build Components
        run: |
          cargo build --release --bin lexer
          ghc -dynamic faxc/src/components/sema/sema.hs -o faxc/src/components/sema/sema_bin
          g++ faxc/src/components/codegen/codegen.cpp -o faxc/src/components/codegen/codegen_bin

      - name: Run Integration Test
        run: |
          echo 'fn main() { print(999); }' > ci.fax
          npm start ci.fax
          ./ci | grep "999"
