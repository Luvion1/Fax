name: Fax-lang CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  lint:
    name: Lint & Format Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.14.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup GHC
        uses: haskell/actions/setup@v2
        with:
          ghc-version: '9.8'
          cabal-version: '3.10'

      - name: Rustfmt (Lexer)
        run: cargo fmt --all --check --manifest-path faxc/packages/lexer/Cargo.toml

      - name: Rustfmt (Optimizer)
        run: cargo fmt --all --check --manifest-path faxc/packages/optimizer/Cargo.toml

      - name: Clippy (Lexer)
        run: cargo clippy --all-targets --manifest-path faxc/packages/lexer/Cargo.toml || true

      - name: Clippy (Optimizer)
        run: cargo clippy --all-targets --manifest-path faxc/packages/optimizer/Cargo.toml || true

      - name: Zig Format Check
        run: zig fmt --check faxc/packages/parser/src/ faxc/packages/runtime/src/

  build-lexer:
    name: Build Lexer (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build Lexer
        run: cd faxc/packages/lexer && cargo build --release
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lexer
          path: faxc/packages/lexer/target/release/lexer

  build-parser:
    name: Build Parser (Zig)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.14.1
      - name: Build Parser
        run: cd faxc/packages/parser && zig build -Doptimize=ReleaseSafe
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: parser
          path: faxc/packages/parser/zig-out/bin/parser

  build-sema:
    name: Build Sema (Haskell)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: haskell/actions/setup@v2
        with:
          ghc-version: '9.8'
          cabal-version: '3.10'
      - name: Build Sema
        run: |
          cd faxc/packages/sema
          ghc -o sema -isrc -isrc/Sema src/Main.hs src/Sema/Diag.hs src/Sema/Types.hs src/Sema/Errors.hs src/Sema/Pretty.hs src/Sema/Api.hs src/Sema/Checker.hs src/Sema/ConstantFolding.hs src/Sema/ControlFlow.hs src/Sema/ASTUtils.hs -package parsec -package containers
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sema
          path: faxc/packages/sema/sema

  build-optimizer:
    name: Build Optimizer (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build Optimizer
        run: cd faxc/packages/optimizer && cargo build --release
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: optimizer
          path: faxc/packages/optimizer/target/release/optimizer

  build-codegen:
    name: Build Codegen (C++)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install LLVM
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-dev clang
      - name: Build Codegen
        run: |
          cd faxc/packages/codegen
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: codegen
          path: faxc/packages/codegen/build/codegen

  build-runtime:
    name: Build Runtime (Zig)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.14.1
      - name: Build Runtime
        run: cd faxc/packages/runtime && zig build -Doptimize=ReleaseSafe
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: runtime
          path: faxc/packages/runtime/zig-out/bin/faxrt

  build-hub:
    name: Build Hub (Node.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Dependencies
        run: cd faxc/packages/hub && npm install
      - name: Build Hub
        run: cd faxc/packages/hub && npm run build
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hub
          path: faxc/packages/hub/dist/

  build-faxt:
    name: Build faxt CLI Tool
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Dependencies
        run: cd faxt && npm install
      - name: Make CLI Executable
        run: chmod +x faxt/main.py
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: faxt
          path: faxt/

  test-sema:
    name: Test Sema (Semantic Analyzer)
    needs: build-sema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download Sema
        uses: actions/download-artifact@v4
        with:
          name: sema
          path: faxc/packages/sema/
      - name: Make Executable
        run: chmod +x faxc/packages/sema/sema
      - name: Test Sema
        run: |
          cd faxc/packages/sema
          echo '{"type": "Program", "body": [{"type": "FunctionDeclaration", "name": "main", "returnType": "void", "args": [], "body": [], "loc": {"line": 1, "col": 1}}]}' | ./sema /dev/stdin

  test-integration:
    name: Integration Tests
    needs: [build-lexer, build-parser, build-sema, build-optimizer, build-codegen, build-runtime, build-hub]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/fax-binaries
          pattern: '*'
          merge-multiple: true
      - name: Setup
        run: |
          chmod +x /tmp/fax-binaries/*
          mkdir -p faxc/packages/lexer/target/release
          mkdir -p faxc/packages/parser/zig-out/bin
          mkdir -p faxc/packages/sema
          mkdir -p faxc/packages/optimizer/target/release
          mkdir -p faxc/packages/codegen/build
          mkdir -p faxc/packages/runtime/zig-out/bin
          cp /tmp/fax-binaries/lexer faxc/packages/lexer/target/release/
          cp /tmp/fax-binaries/parser faxc/packages/parser/zig-out/bin/
          cp /tmp/fax-binaries/sema faxc/packages/sema/
          cp /tmp/fax-binaries/optimizer faxc/packages/optimizer/target/release/
          cp /tmp/fax-binaries/codegen faxc/packages/codegen/build/
          cp /tmp/fax-binaries/faxrt faxc/packages/runtime/zig-out/bin/
      - name: Run Tests
        run: |
          # Test basic compilation
          cd faxc/packages/hub
          npm install
          # Test would go here
