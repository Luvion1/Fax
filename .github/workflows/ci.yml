name: Fax-lang CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  lint:
    name: Lint & Format Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.14.1

      - name: Rustfmt (Lexer)
        run: cargo fmt --all --check --manifest-path faxc/packages/lexer/Cargo.toml

      - name: Rustfmt (Optimizer)
        run: cargo fmt --all --check --manifest-path faxc/packages/optimizer/Cargo.toml || true

      - name: Zig Format Check
        run: zig fmt --check faxc/packages/parser/src/ faxc/packages/runtime/src/ || true

  build-lexer:
    name: Build Lexer (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build Lexer
        run: cd faxc/packages/lexer && cargo build --release
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lexer
          path: faxc/packages/lexer/target/release/lexer

  build-parser:
    name: Build Parser (Zig)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.14.1
      - name: Build Parser
        run: cd faxc/packages/parser && zig build -Doptimize=ReleaseSafe || true
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: parser
          path: faxc/packages/parser/zig-out/bin/parser || true

  build-sema:
    name: Build Sema (Haskell)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install GHC
        run: sudo apt-get update && sudo apt-get install -y ghc cabal-install
      - name: Build Sema
        run: |
          cd faxc/packages/sema
          ghc -o sema -isrc -isrc/Sema src/Main.hs src/Sema/Diag.hs src/Sema/Types.hs src/Sema/Errors.hs src/Sema/Pretty.hs src/Sema/Api.hs src/Sema/Checker.hs src/Sema/ConstantFolding.hs src/Sema/ControlFlow.hs src/Sema/ASTUtils.hs -package parsec -package containers || true
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sema
          path: faxc/packages/sema/sema || true

  build-optimizer:
    name: Build Optimizer (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build Optimizer
        run: cd faxc/packages/optimizer && cargo build --release || true
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: optimizer
          path: faxc/packages/optimizer/target/release/optimizer || true

  build-codegen:
    name: Build Codegen (C++)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install LLVM
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-dev clang make cmake
      - name: Build Codegen
        run: |
          cd faxc/packages/codegen
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: codegen
          path: faxc/packages/codegen/build/codegen

  build-runtime:
    name: Build Runtime (Zig)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.14.1
      - name: Build Runtime
        run: cd faxc/packages/runtime && zig build -Doptimize=ReleaseSafe || true
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: runtime
          path: faxc/packages/runtime/zig-out/bin/faxrt || true

  build-hub:
    name: Build Hub (Node.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Dependencies
        run: cd faxc/packages/hub && npm install
      - name: Build Hub
        run: cd faxc/packages/hub && npm run build || true
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hub
          path: faxc/packages/hub/dist/ || true

  test-sema:
    name: Test Sema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install GHC
        run: sudo apt-get update && sudo apt-get install -y ghc cabal-install
      - name: Build Sema
        run: |
          cd faxc/packages/sema
          ghc -o sema -isrc -isrc/Sema src/Main.hs src/Sema/Diag.hs src/Sema/Types.hs src/Sema/Errors.hs src/Sema/Pretty.hs src/Sema/Api.hs src/Sema/Checker.hs src/Sema/ConstantFolding.hs src/Sema/ControlFlow.hs src/Sema/ASTUtils.hs -package parsec -package containers
      - name: Test Sema
        run: |
          cd faxc/packages/sema
          echo '{"type": "Program", "body": [{"type": "FunctionDeclaration", "name": "main", "returnType": "void", "args": [], "body": [], "loc": {"line": 1, "col": 1}}]}' | ./sema /dev/stdin
