name: Fax-lang Master CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-test:
    name: Build & Test (Linux)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      # --- CACHE SETUP ---
      - name: Cache Toolchain
        id: cache-tools
        uses: actions/cache@v4
        with:
          path: |
            ~/tools
            ~/.cargo
            ~/.ghcup
          key: ${{ runner.os }}-tools-v2-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-tools-v2-

      - name: Prepare Paths
        run: |
          mkdir -p ~/tools
          echo "$HOME/tools/node-v25.4.0-linux-x64/bin" >> $GITHUB_PATH
          echo "$HOME/tools/zig-linux" >> $GITHUB_PATH
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          echo "$HOME/.ghcup/bin" >> $GITHUB_PATH

      - name: Install System Deps
        run: |
          sudo apt-get update
          sudo apt-get install -y wget curl build-essential libgmp-dev libncurses-dev xz-utils git python3-venv

      - name: Install Node.js v25.4.0
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: |
          wget -q https://nodejs.org/dist/v25.4.0/node-v25.4.0-linux-x64.tar.xz
          tar -xf node-v25.4.0-linux-x64.tar.xz -C ~/tools/

      - name: Install Zig (Master)
        run: |
          rm -rf ~/tools/zig-linux
          ZIG_URL=$(curl -s https://ziglang.org/download/index.json | grep -A 10 '"master":' | grep 'x86_64-linux' | grep 'tarball' | cut -d '"' -f 4)
          wget -q "$ZIG_URL" -O zig.tar.xz
          mkdir -p ~/tools/zig-linux
          tar -xf zig.tar.xz --strip-components=1 -C ~/tools/zig-linux

      - name: Install Rust 1.93.0
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain 1.93.0

      - name: Install GHC
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://get-ghcup.haskell.org | sh
          . $HOME/.ghcup/env
          ghcup install ghc 9.10.1
          ghcup set ghc 9.10.1

      - name: Verify Versions
        run: |
          node -v
          zig version
          cargo --version

      - name: Install NPM Deps
        run: npm ci

      - name: Build Components
        run: |
          cargo build --release --bin lexer
          ghc -dynamic faxc/src/components/sema/sema.hs -o faxc/src/components/sema/sema_bin
          g++ faxc/src/components/codegen/codegen.cpp -o faxc/src/components/codegen/codegen_bin

      - name: Run Integration Test
        run: |
          echo 'fn main() { print(999); }' > ci.fax
          npm start ci.fax
          ./ci | grep "999"