<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Gradient untuk background -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    
    <!-- Gradient untuk glow effect -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </radialGradient>
    
    <!-- Drop shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#6366f1" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background shape dengan rounded corners -->
  <rect x="10" y="10" width="180" height="180" rx="40" ry="40" 
        fill="url(#bgGradient)" 
        filter="url(#shadow)"/>
  
  <!-- Glow effect -->
  <rect x="10" y="10" width="180" height="180" rx="40" ry="40" 
        fill="url(#glow)"/>
  
  <!-- Letter F dengan modern styling -->
  <text x="100" y="135" 
        font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
        font-size="110" 
        font-weight="800" 
        fill="white" 
        text-anchor="middle"
        style="letter-spacing: -2px;">
    F
  </text>
  
  <!-- Decorative elements - dots -->
  <circle cx="45" cy="55" r="8" fill="white" opacity="0.9"/>
  <circle cx="155" cy="145" r="8" fill="white" opacity="0.9"/>
  
  <!-- Small accent dots -->
  <circle cx="155" cy="55" r="4" fill="white" opacity="0.6"/>
  <circle cx="45" cy="145" r="4" fill="white" opacity="0.6"/>
</svg>
