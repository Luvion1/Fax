<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Gradient background -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c"/>
      <stop offset="50%" style="stop-color:#c0392b"/>
      <stop offset="100%" style="stop-color:#a93226"/>
    </linearGradient>
    
    <!-- Fur gradient -->
    <linearGradient id="furGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f5f5f5"/>
    </linearGradient>
    
    <!-- Inner ear gradient -->
    <linearGradient id="innerEar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8c471"/>
      <stop offset="100%" style="stop-color:#f5b7b1"/>
    </linearGradient>
    
    <!-- Eye gradient -->
    <radialGradient id="eyeGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#2c3e50"/>
      <stop offset="70%" style="stop-color:#1a252f"/>
      <stop offset="100%" style="stop-color:#000000"/>
    </radialGradient>
    
    <!-- Nose gradient -->
    <radialGradient id="noseGradient" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#2c3e50"/>
      <stop offset="100%" style="stop-color:#000000"/>
    </radialGradient>
    
    <!-- Soft shadow -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge> 
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/> 
      </feMerge>
    </filter>
    
    <!-- Drop shadow -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#c0392b" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect x="10" y="10" width="180" height="180" rx="35" ry="35" 
        fill="url(#bgGradient)" 
        filter="url(#dropShadow)"/>
  
  <!-- Fox Group -->
  <g transform="translate(100, 100)">
    <!-- Left Ear -->
    <path d="M -35,-40 
             Q -55,-70 -60,-85 
             Q -50,-90 -35,-80 
             Q -20,-70 -15,-50 Z" 
          fill="#ffffff" filter="url(#softShadow)"/>
    <path d="M -40,-45 
             Q -50,-65 -52,-75 
             Q -45,-78 -35,-72 
             Q -28,-65 -25,-52 Z" 
          fill="url(#innerEar)"/>
    
    <!-- Right Ear -->
    <path d="M 35,-40 
             Q 55,-70 60,-85 
             Q 50,-90 35,-80 
             Q 20,-70 15,-50 Z" 
          fill="#ffffff" filter="url(#softShadow)"/>
    <path d="M 40,-45 
             Q 50,-65 52,-75 
             Q 45,-78 35,-72 
             Q 28,-65 25,-52 Z" 
          fill="url(#innerEar)"/>
    
    <!-- Main Head -->
    <path d="M -50,-20 
             Q -55,10 -45,35 
             Q -35,55 -15,65 
             L 0,72 
             L 15,65 
             Q 35,55 45,35 
             Q 55,10 50,-20 
             Q 45,-45 0,-50 
             Q -45,-45 -50,-20 Z" 
          fill="url(#furGradient)" filter="url(#softShadow)"/>
    
    <!-- Face White Patch -->
    <path d="M -25,25 
             Q -15,50 0,58 
             Q 15,50 25,25 
             Q 20,35 0,40 
             Q -20,35 -25,25 Z" 
          fill="#ffffff"/>
    
    <!-- Left Eye -->
    <g transform="translate(-25, -5)">
      <!-- Eye white -->
      <ellipse cx="0" cy="0" rx="14" ry="16" fill="#ffffff"/>
      <!-- Iris -->
      <ellipse cx="0" cy="0" rx="11" ry="13" fill="#f39c12"/>
      <!-- Pupil -->
      <ellipse cx="0" cy="0" rx="7" ry="9" fill="url(#eyeGradient)"/>
      <!-- Highlight -->
      <ellipse cx="3" cy="-4" rx="3" ry="4" fill="#ffffff" opacity="0.9"/>
      <circle cx="-2" cy="5" r="1.5" fill="#ffffff" opacity="0.5"/>
      <!-- Eyelid shadow -->
      <path d="M -12,-8 Q 0,-12 12,-8" stroke="#e74c3c" stroke-width="2" fill="none" opacity="0.3"/>
    </g>
    
    <!-- Right Eye -->
    <g transform="translate(25, -5)">
      <!-- Eye white -->
      <ellipse cx="0" cy="0" rx="14" ry="16" fill="#ffffff"/>
      <!-- Iris -->
      <ellipse cx="0" cy="0" rx="11" ry="13" fill="#f39c12"/>
      <!-- Pupil -->
      <ellipse cx="0" cy="0" rx="7" ry="9" fill="url(#eyeGradient)"/>
      <!-- Highlight -->
      <ellipse cx="3" cy="-4" rx="3" ry="4" fill="#ffffff" opacity="0.9"/>
      <circle cx="-2" cy="5" r="1.5" fill="#ffffff" opacity="0.5"/>
      <!-- Eyelid shadow -->
      <path d="M -12,-8 Q 0,-12 12,-8" stroke="#e74c3c" stroke-width="2" fill="none" opacity="0.3"/>
    </g>
    
    <!-- Nose -->
    <ellipse cx="0" cy="38" rx="10" ry="7" fill="url(#noseGradient)"/>
    <!-- Nose shine -->
    <ellipse cx="-2" cy="36" rx="3" ry="2" fill="#ffffff" opacity="0.4"/>
    
    <!-- Mouth -->
    <path d="M -12,48 Q -6,55 0,52 Q 6,55 12,48" 
          stroke="#2c3e50" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 0,52 L 0,58" stroke="#2c3e50" stroke-width="2" fill="none"/>
    
    <!-- Left Cheek Fluff -->
    <ellipse cx="-42" cy="15" rx="8" ry="10" fill="#ffffff" opacity="0.9"/>
    <ellipse cx="-38" cy="25" rx="6" ry="8" fill="#ffffff" opacity="0.8"/>
    
    <!-- Right Cheek Fluff -->
    <ellipse cx="42" cy="15" rx="8" ry="10" fill="#ffffff" opacity="0.9"/>
    <ellipse cx="38" cy="25" rx="6" ry="8" fill="#ffffff" opacity="0.8"/>
    
    <!-- Whiskers Left -->
    <g opacity="0.4">
      <line x1="-25" y1="40" x2="-50" y2="35" stroke="#2c3e50" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="-25" y1="45" x2="-52" y2="45" stroke="#2c3e50" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="-25" y1="50" x2="-48" y2="55" stroke="#2c3e50" stroke-width="1.2" stroke-linecap="round"/>
    </g>
    
    <!-- Whiskers Right -->
    <g opacity="0.4">
      <line x1="25" y1="40" x2="50" y2="35" stroke="#2c3e50" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="25" y1="45" x2="52" y2="45" stroke="#2c3e50" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="25" y1="50" x2="48" y2="55" stroke="#2c3e50" stroke-width="1.2" stroke-linecap="round"/>
    </g>
    
    <!-- Forehead fur tuft -->
    <path d="M -5,-45 Q 0,-55 5,-45 Q 0,-48 -5,-45" fill="#ffffff" opacity="0.9"/>
    
    <!-- Eyebrows -->
    <path d="M -35,-20 Q -25,-25 -15,-20" stroke="#c0392b" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.6"/>
    <path d="M 35,-20 Q 25,-25 15,-20" stroke="#c0392b" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  </g>
</svg>